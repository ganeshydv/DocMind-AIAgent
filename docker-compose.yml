version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant
    container_name: ai-helper-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: ai-helper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: